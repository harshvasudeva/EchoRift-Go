# Example LiveKit config for local EchoRift development.
# Copy to livekit.local.yaml and replace the key/secret before real use.

port: 7880
bind_addresses:
  - "0.0.0.0"

rtc:
  use_external_ip: false
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100

keys:
  replace-with-a-local-livekit-key: replace-with-a-local-livekit-secret

logging:
  level: info
